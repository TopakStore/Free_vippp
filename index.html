<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPAK PRO AI | Official Site</title>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; }
        input { width: 80%; padding: 12px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 12px 20px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #response { margin-top: 20px; padding: 15px; background: #21262d; border-radius: 10px; text-align: left; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>TOPAK PRO AI 🤖</h1>
    <p>The next generation of intelligence.</p>
    <input type="text" id="msg" placeholder="Ask me something...">
    <br>
    <button onclick="askAI()">Send Message</button>
    <div id="response">Waiting for your question...</div>
</div>

<script>
    async function askAI() {
        const msg = document.getElementById('msg').value;
        const resBox = document.getElementById('response');
        if(!msg) return;
        
        resBox.innerText = "Thinking...";
        try {
            const response = await fetch(`https://api.popcat.xyz/chatbot?msg=${encodeURIComponent(msg)}`);
            const data = await response.json();
            resBox.innerText = data.response;
        } catch {
            resBox.innerText = "Error connecting to AI server.";
        }
    }
</script>

</body>
</html>
