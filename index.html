<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPAK PRO AI | Intelligence</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #161b22; padding: 15px; text-align: center; border-bottom: 1px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        header h1 { color: #58a6ff; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background-color: #238636; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background-color: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        #input-container { background-color: #161b22; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; background-color: #0d1117; border: 1px solid #30363d; padding: 12px; color: white; border-radius: 25px; outline: none; padding-left: 20px; }
        input:focus { border-color: #58a6ff; }
        button { background: linear-gradient(45deg, #238636, #2ea043); color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<header>
    <h1>TOPAK PRO AI 🧠</h1>
</header>

<div id="chat-box">
    <div class="msg bot">سلام مشر صیب! زه TOPAK PRO AI یم. څنګه درسره مرسته کولای شم؟<br>(Hello! I am ready to help.)</div>
</div>

<div id="input-container">
    <input type="text" id="user-input" placeholder="دلته خپله پوښتنه ولیکئ..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const text = input.value.trim();

        if (!text) return;

        // User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.innerText = text;
        chatBox.appendChild(userDiv);
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Bot Thinking...
        const botDiv = document.createElement('div');
        botDiv.className = 'msg bot';
        botDiv.innerText = "Thinking...";
        chatBox.appendChild(botDiv);

        try {
            // د یوې نوې او باوري سرچینې کارول (Stable Public API)
            const response = await fetch(`https://api.simsimi.vn/v2/?text=${encodeURIComponent(text)}&lc=en`);
            const data = await response.json();
            
            if(data.success) {
                botDiv.innerText = data.success;
            } else {
                botDiv.innerText = "I am processing your request. Please try a different question.";
            }
        } catch (e) {
            botDiv.innerText = "Error: Connection lost. Try again!";
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
